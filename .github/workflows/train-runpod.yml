name: Train on RunPod

on:
  workflow_dispatch:
    inputs:
      experiment:
        description: "Experiment name (used as output subfolder, e.g. 'baseline-v1')"
        required: true
      gpu_type:
        description: "RunPod GPU type"
        required: false
        default: "NVIDIA A40"
      cloud_type:
        description: "RunPod cloud type (COMMUNITY or SECURE)"
        required: false
        default: "COMMUNITY"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Launch RunPod training pod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          GIT_SSH_KEY: ${{ secrets.GIT_SSH_KEY }}
          RUNPOD_VOLUME_ID: ${{ secrets.RUNPOD_VOLUME_ID }}
          EXPERIMENT: ${{ inputs.experiment }}
          GPU_TYPE: ${{ inputs.gpu_type || 'NVIDIA A40' }}
          CLOUD_TYPE: ${{ inputs.cloud_type || 'COMMUNITY' }}
        run: python .github/scripts/launch_runpod.py
