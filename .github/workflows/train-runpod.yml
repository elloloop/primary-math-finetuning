name: Train on RunPod

on:
  workflow_dispatch:
    inputs:
      experiment:
        description: "Experiment name (used as output subfolder, e.g. 'baseline-v1')"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Resume RunPod training pod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_POD_ID: ${{ secrets.RUNPOD_POD_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          GIT_SSH_KEY: ${{ secrets.GIT_SSH_KEY }}
          RUNPOD_VOLUME_ID: ${{ secrets.RUNPOD_VOLUME_ID }}
          EXPERIMENT: ${{ inputs.experiment }}
        run: python .github/scripts/launch_runpod.py
